# Project-wide Gradle settings.

# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE *will override*
# any settings specified in this file.

# 1. OPTIMISATIONS DE MÉMOIRE ET DE COMPILATION (Crucial pour le traitement vidéo)
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.daemon=true
org.gradle.configureondemand=true

# 2. CONFIGURATIONS ARCHITECTURALES ANDROIDX ET JETIFIER
android.useAndroidX=true
android.enableJetifier=true

# 3. ARCHITECTURES MATÉRIELLES CIBLÉES (Pour émulateurs et vrais téléphones)
reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64

# 4. ENGINES ET NOUVELLE ARCHITECTURE REACT NATIVE
newArchEnabled=false
hermesEnabled=true
edgeToEdgeEnabled=false